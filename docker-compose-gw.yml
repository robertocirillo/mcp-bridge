services:
  mcp-bridge:
    build: .
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      DEBUG: "False"
      # Aggiunta variabile MCP_SERVERS con JSON valido
      MCP_SERVERS: '{"MCP_DOCKER": {"url": "http://localhost:11434"}}'
      MCP_HOST: "http://localhost:9011/mcp"
    env_file:
      - .env
    volumes:
#      - ./logs:/app/logs
      - /home/cirillo/workspace/mcp-national-rail:/app/servers/mcp-national-rails:ro
#      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    network_mode: "host"
    depends_on:
      - gateway
  gateway:
    image: docker/mcp-gateway
    command:
      - --transport=streaming
      - --servers=duckduckgo
      - --port=9011
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    network_mode: "host"

