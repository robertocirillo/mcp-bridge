services:
  mcp-bridge:
    container_name: mcp-bridge
    build: .
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      MCP_USE_DEBUG: "2"
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
    env_file:
      - .env
    volumes:
      - /home/cirillo/workspace/mcp-national-rail:/app/servers/mcp-national-rails:ro
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://host.docker.internal:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      bias-detector-service:
        condition: service_healthy

  # Local bias-detector-service (NOT exposed externally).
  # Build context expects this repo layout:
  #   mcp-bridge/
  #   bias-detector-service/
  # So that: ../bias-detector-service points to the service repo.
  bias-detector-service:
    container_name: bias-detector-service
    build:
      context: ../bias-detector-service
    environment:
      # ------------------------------
      # Server settings (app/settings.py)
      # ------------------------------
      # HOST (default: 0.0.0.0)
      HOST: "0.0.0.0"
      # PORT (default: 9090)
      PORT: "9090"
      # DEBUG (default: false)
      # DEBUG: "false"

      # ------------------------------
      # Hugging Face cache / offline
      # ------------------------------
      # HF_HOME (default: unset/None). In Docker we set it to a persistent volume.
      HF_HOME: "/hf_cache"
      # HF_OFFLINE (default: false)
      HF_OFFLINE: "false"

      # ------------------------------
      # Model
      # ------------------------------
      # MODEL_ID (default: cardiffnlp/twitter-roberta-base-hate-latest)
      # For offline/dev tests you can set MODEL_ID="__mock__".
      MODEL_ID: "cardiffnlp/twitter-roberta-base-hate-latest"
      # REVISION (default: unset/None)
      # REVISION: ""
      # DEVICE (default: cpu)
      DEVICE: "cpu"

      # ------------------------------
      # Inference
      # ------------------------------
      # MAX_LENGTH (default: 512)
      MAX_LENGTH: "512"
      # BATCH_SIZE (default: 8)
      BATCH_SIZE: "8"
      # THRESHOLD (default: 0.5)
      THRESHOLD: "0.5"

      # ------------------------------
      # Limits
      # ------------------------------
      # MAX_INPUT_CHARS (default: 20000)
      MAX_INPUT_CHARS: "20000"

      # ------------------------------
      # Warmup
      # ------------------------------
      # WARMUP (default: true)
      WARMUP: "true"

      # ------------------------------
      # Model pool (in-memory, until restart)
      # ------------------------------
      # MAX_LOADED_MODELS (default: 0)  # 0 = unlimited
      MAX_LOADED_MODELS: "0"

      # ------------------------------
      # Logging
      # ------------------------------
      # LOG_LEVEL (default: INFO)
      LOG_LEVEL: "INFO"

      # ------------------------------
      # Heuristic span triggers
      # ------------------------------
      # SPAN_TRIGGERS (default: always,never,all,nobody,everyone)
      SPAN_TRIGGERS: "always,never,all,nobody,everyone"

      # ------------------------------
      # Category policy (optional)
      # ------------------------------
      # BIAS_CATEGORY_MAP_PATH (default: unset/None)
      # BIAS_CATEGORY_MAP_PATH: "/app/category_map.json"
      # BIAS_CATEGORY_MAP_JSON (default: unset/None)
      # BIAS_CATEGORY_MAP_JSON: '{"hate":["HATE","NOT-HATE"]}'

    # Do NOT publish ports: bias-detector-service must be reachable only from mcp-bridge.
    # Other containers in this compose can still reach it at: http://bias-detector-service:9090
    expose:
      - "9090"

    restart: unless-stopped
    volumes:
      - hf-cache:/hf_cache

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/healthz"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  hf-cache:
