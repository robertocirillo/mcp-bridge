services:
  ollama-server:
    image: ollama/ollama:latest
    container_name: ollama-server
    pull_policy: always
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - OLLAMA_DEBUG=1
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    runtime: nvidia
    restart: unless-stopped

  ollama-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ollama-webui
    pull_policy: always
    restart: unless-stopped
    environment:
      - 'OLLAMA_BASE_URL=http://ollama-server:11434'
    volumes:
      - webui-data:/app/backend/data
    ports:
      - "3010:8080"
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    runtime: nvidia

  mcp-bridge:
    build: .
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      DEBUG: "false"
      OLLAMA_BASE_URL: "http://ollama-server:11434"
    env_file:
      - .env
    # Optional mounts:
    # - ./logs:/app/logs
    # - ./servers:/app/servers:ro
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://mcp-bridge:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  ollama-data:
  webui-data:
