services:
  mcp-bridge:
    build: .
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      DEBUG: "False"
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      MCP_HOST: "http://gateway:9011/mcp"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - /Users/roberto/python-test/mcp-national-rail:/app/servers/mcp-national-rails:ro
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://host.docker.internal:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - gateway
  gateway:
    image: docker/mcp-gateway
    command:
      - --transport=streaming
      - --servers=duckduckgo
      - --port=9011
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock