services:
  mcp-bridge:
    build: .
    ports:
      - "8000:8000"
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      DEBUG: "false"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
      # used when gateway is in another container
      MCP_HOST: "${MCP_HOST:-http://gateway:9011/mcp}"
    env_file:
      - .env
    # Optional mounts:
    # - ./logs:/app/logs
    # - ./servers:/app/servers:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://mcp-bridge:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - gateway
    extra_hosts:
      - host.docker.internal:host-gateway
  gateway:
    image: docker/mcp-gateway:dind
    privileged: true
    ports:
      - "9011:9011"
    command:
      - --transport=sse
      - --servers=duckduckgo
      - --port=9011
      - --memory=512Mb
