services:
  mcp-bridge:
    build: .
    ports:
      - "8000:8000"
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      DEBUG: "False"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - /Users/roberto/python-test/mcp-national-rail:/app/servers/mcp-national-rails:ro # Monta il server MCP in sola lettura
      - /var/run/docker.sock:/var/run/docker.sock # Monta il socket Docker per eseguire comandi dinamici
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
