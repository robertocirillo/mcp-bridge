services:
  mcp-bridge:
    build: .
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      DEBUG: "False"
    env_file:
      - .env
    volumes:
#      - ./logs:/app/logs
      - /home/cirillo/workspace/mcp-national-rail:/app/servers/mcp-national-rails:ro
#      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    network_mode: "host"

