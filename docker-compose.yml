services:
  mcp-bridge:
    container_name: mcp-bridge
    build: .
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      MCP_USE_DEBUG: "2"
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
    env_file:
      - .env
    volumes:
      - /home/cirillo/workspace/mcp-national-rail:/app/servers/mcp-national-rails:ro
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://host.docker.internal:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    extra_hosts:
      - host.docker.internal:host-gateway
